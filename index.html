    /*burger效果*/
    .burger {
  position: relative;
  width: calc(var(--topbar-height) - 3px);
  height: calc(var(--topbar-height) - 12px);
  background: transparent;
  cursor: pointer;
  display: block;
}

.burger input {
  display: none;
}

.burger span {
  display: block;
  position: absolute;
  height: 4px;
  width: 100%;
  background: #2D2D2D;
  border-radius: 9px;
  opacity: 1;
  left: 0;
  transform: rotate(0deg);
  transition: .25s ease-in-out;
}

.burger span:nth-of-type(1) {
  top: 0px;
  transform-origin: left center;
}

.burger span:nth-of-type(2) {
  top: 50%;
  transform: translateY(-50%);
  transform-origin: left center;
}

.burger span:nth-of-type(3) {
  top: 100%;
  transform-origin: left center;
  transform: translateY(-100%);
}

.burger input:checked ~ span:nth-of-type(1) {
  transform: rotate(45deg);
  top: 0px;
  left: 5px;
}

.burger input:checked ~ span:nth-of-type(2) {
  width: 0%;
  opacity: 0;
}

.burger input:checked ~ span:nth-of-type(3) {
  transform: rotate(-45deg);
  top: 28px;
  left: 5px;
}
  #navigation-box{

  left:0;
  top:var(--topbar-height);
  width:var(--body-width);

 }

.lazy-img-container {

.lazy-img-full {

  left: 0;
  opacity: 0;
  transition: opacity 0.7s ease-out;
}

    const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // 进入视野：播放动画
      entry.target.classList.add('play');
    } else {
      // 离开视野：重置动画
      entry.target.classList.remove('play');
    }
  });
}, {
  threshold: 0.1 // 露出10%就触发
});

// 监听所有需要动画的元素
document.querySelectorAll('.more-case-p').forEach(el => {
  observer.observe(el);
});


/*豆包科技——你值得拥有*/
class LazyImg {
  static init() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          this.render(entry.target);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('lazy-img').forEach(el => {
      observer.observe(el);
    });
  }

  static render(el) {
    const thumbSrc = el.getAttribute('thumb');
    const fullSrc = el.getAttribute('src');

    const wrap = document.createElement('div');
    wrap.className = 'lazy-img-container';

    const thumbImg = document.createElement('img');
    thumbImg.className = 'lazy-img-thumb';
    thumbImg.src = thumbSrc;

    const fullImg = document.createElement('img');
    fullImg.className = 'lazy-img-full';

    wrap.appendChild(thumbImg);
    wrap.appendChild(fullImg);
    el.replaceWith(wrap);

    fullImg.onload = () => {
      fullImg.classList.add('loaded');
    };
    fullImg.src = fullSrc;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  LazyImg.init();
});
