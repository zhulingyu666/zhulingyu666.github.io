<!doctype html>
<html>
    <head> 
        <meta charset="UTF-8"> 
        <meta name="viewport" id="viewport" content="width=device-width, initial-scale=1"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta property="og:title" content="我的个人网站">
        <meta property="og:description" content="你好，我叫:朱凌瑀，一名技术爱好者">
        <meta property="og:url" content="https://zhulingyu666.github.io/">
        <meta name="description" content="朱凌瑀，我的个人网站">
        <meta name="keywords" content="朱凌瑀, 个人网站, 前端开发">
        <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
        <title>我的个人网站-朱凌瑀</title>
    </head> 
    <body> 
    <style>
    *{
    margin: 0;
    padding: 0;
    }
    :root{
    --body-width:100%;
    --body-height:100vh;
    --topbar-height:42px;
    }
    body{
    background: linear-gradient(135deg,#4D2EFF,#0800FF75);
    background-attachment: fixed;
    width: var(--body-width);
    height: var(--body-height);
    }
    #topbar{
    position:fixed;
    width: var(--body-width);
    max-width:600px;
    height:var(--topbar-height);
    min-width:100px;
    background: linear-gradient(90deg,#A98BFF,transparent);
    border-bottom-right-radius: 25px;   
    border-bottom:1px solid #FFFFFF50;
    border-left:10px solid #FFFFFF;
    animation:1.5s borderflash infinite;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display:flex;
    align-items:center;
    top:0;
    left:0;
    }
    @keyframes borderflash{
    from{border-left:10px solid #FFFFFF;}
    55%{border-left:10px solid #FFFFFF;}
    to{border-left:10px solid transparent;}
    }
    .welcomep{
    color:#FFFFFF;
    margin-top: 10px;
    text-align:center;
    display:flex;
    width: var(--body-width);
    justify-content:center;
    
    flex-wrap: wrap;
    }
    #personal-introduction-box{
    width:var(--body-width);
    display:flex;
    justify-content:center;
    background-color:transparent;
    flex-wrap: wrap;
    margin-top:var(--topbar-height);
    
    }
    #name-show{
    background: linear-gradient(90deg, #00AFFF, #46D2FF,90%,#00AFFF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-size:5rem;
    width:var(--body-width);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    text-align:center;
    margin-top:4px;
    }
    .Brief-about{
    width:var(--body-width);
    text-align:center;
    background: linear-gradient(90deg, #FFFFFF, #FF8B8B);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    transform: translateX(20px);
    
    }
    .welcomespan{
    letter-spacing: 1vw;
    font-size:1.2rem;
    width:var(--body-width);
    background: linear-gradient(90deg, #FFFB00,#E8B9FF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    }
    /*burger效果*/
    .burger {
  position: relative;
  width: calc(var(--topbar-height) - 3px);
  height: calc(var(--topbar-height) - 12px);
  background: transparent;
  cursor: pointer;
  display: block;
}

.burger input {
  display: none;
}

.burger span {
  display: block;
  position: absolute;
  height: 4px;
  width: 100%;
  background: #2D2D2D;
  border-radius: 9px;
  opacity: 1;
  left: 0;
  transform: rotate(0deg);
  transition: .25s ease-in-out;
}

.burger span:nth-of-type(1) {
  top: 0px;
  transform-origin: left center;
}

.burger span:nth-of-type(2) {
  top: 50%;
  transform: translateY(-50%);
  transform-origin: left center;
}

.burger span:nth-of-type(3) {
  top: 100%;
  transform-origin: left center;
  transform: translateY(-100%);
}

.burger input:checked ~ span:nth-of-type(1) {
  transform: rotate(45deg);
  top: 0px;
  left: 5px;
}

.burger input:checked ~ span:nth-of-type(2) {
  width: 0%;
  opacity: 0;
}

.burger input:checked ~ span:nth-of-type(3) {
  transform: rotate(-45deg);
  top: 28px;
  left: 5px;
}
  #navigation-box{
  position:fixed;
  left:0;
  top:var(--topbar-height);
  width:var(--body-width);
  height:var(--body-height);
  --max-width:500px;
  max-width:var(--max-width);
  max-height:800px;
  background-color:#FFFFFF90;
  display:none;/*block，默认为none*/
  backdrop-filter: blur(2px);
  border-bottom-right-radius: 5vw;
  will-change: clip-path; /* 提前告诉浏览器要动画 */
  transform: translateZ(0); /* 强制GPU加速 */
  backface-visibility: hidden; /* 减少闪烁 */
  animation: navigationappear 0.4s ease-out;
  z-index:2;
  }
  @keyframes navigationappear{
  from{
  -webkit-clip-path: polygon(0 0, 17% 0, 17% 15%, 0 15%);
  clip-path: polygon(0 0, 17% 0, 17% 15%, 0 15%);}
  to{
  -webkit-clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);}
  }
  .linkbox{
  width:var(--body-width);
  max-width:var(--max-width);
  height:50px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
  display:flex;
  justify-content:flex-start;
  align-items:center;
  font-size:1.5rem;
  color:#6300FF;
  font-weight: bold;
  padding-left: 10px;
  cursor: pointer;
  transition: 0.15s;
  margin-top:2px;
  }
  .linkbox:hover{
  backdrop-filter: blur(5px);
  }
    </style>
    <div id="topbar">
     <label class="burger" for="burger">
     <input type="checkbox" id="burger">
     <span></span>
     <span></span>
     <span></span>
    </label>
    
    
    </div>
    <div id="navigation-box">
     <div class="linkbox" href="#personal-introduction-box">简介</div>
     <div class="linkbox">信息展示</div>
    </div>
    <div id="personal-introduction-box">
     <p class="welcomep"><span class="welcomespan">用代码构建秩序，用创新定义未来</span><span style="margin-top:7px;font-size:1.2rem;">欢迎来到我的个人网站:</span></p>
     <h1 id="name-show">朱凌瑀</h1>
     <p class="Brief-about">————名技术爱好者</p>
    </div>
    <noscript>
    当前无script，请打开script。
    </noscript>
    <script>
    burger.addEventListener("click",navigationBox)
    function navigationBox(){
    if (burger.checked){
    document.getElementById("navigation-box").style.display="block"
}else{
    document.getElementById("navigation-box").style.display="none"
}
}
    
    </script>
    </body>
</html>
